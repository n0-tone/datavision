<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>no-tone | DataVision</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #05070c;
            height: 100vh;
            overflow: hidden;
        }

        .wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        iframe {
            display: block;
            border: none;
            width: 100%;
            height: 100%;
            background: #05070c;
        }

        .hide-footer {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 50px;
            background: #05070c;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <iframe src="https://datavision1.streamlit.app/?embed=true"></iframe>
        <div class="hide-footer"></div>
    </div>
</body>
</html>
